name: Deploy Astro to GitHub Pages

on:
  # 等待 update_posts 工作流完成后触发
  workflow_run:
    workflows:
      - update_posts
    types:
      - completed
  # 允许手动触发部署
  workflow_dispatch:

# 设置 GITHUB_TOKEN 的权限，以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 仅允许一个并发部署，跳过正在等待的队列之间的运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # ✅ 第九步：README → articles.json
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Generate articles.json from README
        run: |
          bun run src/scripts/parse-readme.ts

      # Astro 官方 Action 会自动检测你仓库里的 lockfile
      # Chirping 主题默认使用 Bun，这里会自动适配
      - name: Install, build, and upload site
        uses: withastro/action@v6
        with:
          # 如果你没有自定义需求，path、node-version 等都可以留空让 Action 自动检测
          # 比如指定 Node 版本：          
          node-version: 24
          # 比如指定包管理器：package-manager: bun
        # env:
          # 如果 Chirping 主题需要特定的环境变量，可以在这里配置
          # 例如：PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
          # NODE_VERSION: '24'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5