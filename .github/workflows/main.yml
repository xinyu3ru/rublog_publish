name: update_posts
on:
  push:
    branches:
      - main
    paths:
      - 'need_post/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:
permissions:
  contents: write
  pages: write
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    env:
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      HOST: ${{ secrets.HOST }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
      # 建立 pngquant 环境
      - name: Install pngquant
        run: sudo apt install -y pngquant
      # 建立 Python 环境并缓存依赖
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Cache pip and uv artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/uv
          key: ${{ runner.os }}-pip-uv-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pip-uv-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-uv-
      - name: Install uv and project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv sync --locked --no-install-project
      - name: Post Article
        run: uv run python main.py
        # 把改动内容推送回 github 仓库
      - name: Commit and push if changed   # 将 README.md 更新到仓库
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config --global user.email "${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com"
            git config --global user.name "${{ github.actor }}"
            git add -A
            git commit -m "Github Action auto Updated"
            git push
          else
            echo "No changes to commit"
          fi