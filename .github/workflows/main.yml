name: update_posts

on:
  push:
    branches:
      - main
    paths:
      - 'need_post/**'
      - 'lib/**'
      - '.github/workflows/main.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  UV_SYSTEM_PYTHON: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y pngquant

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Ensure Python 3.13
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --locked --no-install-project

      - name: Run post script
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          HOST: ${{ secrets.HOST }}
        run: uv run python main.py

      # 把生成的 README.md 复制到 Astro 项目的内容目录下
      - name: Copy README to Astro
        run: |
          cp README.md src/content/home/README.md

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: auto update posts via GitHub Actions"
          file_pattern: "."
          commit_user_name: ${{ github.actor }}
          commit_user_email: ${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com